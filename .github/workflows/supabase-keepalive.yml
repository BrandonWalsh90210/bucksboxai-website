name: Supabase Keep Alive

on:
  schedule:
    # 毎週日曜日 午前9時（日本時間）= UTC 0時に実行
    - cron: '0 0 * * 0'
  workflow_dispatch:  # 手動実行も可能

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent pause
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://ypesemlagxsdixjxvrpb.supabase.co/rest/v1/contact_submissions?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Response code: $response"
          if [ "$response" -eq 200 ]; then
            echo "Supabase ping successful"
          else
            echo "Supabase ping failed with code: $response"
            exit 1
          fi
